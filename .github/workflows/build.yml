name: Build macOS App

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install DMG tool
        run: brew install create-dmg

      - name: Build App
        run: |
          xcodebuild \
          -project AutoClicker.xcodeproj \
          -scheme AutoClicker \
          -configuration Release \
          -derivedDataPath build \
          clean build

      - name: Create DMG
        run: |
          mkdir dist
          create-dmg \
          --volname "AutoClicker" \
          --app-drop-link 400 150 \
          build/Build/Products/Release/AutoClicker.app \
          dist/AutoClicker.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: AutoClicker
          path: dist/AutoClicker.dmg
